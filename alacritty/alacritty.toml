
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[general]
live_config_reload = true
import = [ "~/.config/alacritty/catppuccin-macchiato.toml" ]
[window]
dimensions = { columns = 120, lines = 40 }
padding = { x = 10, y = 10 }
opacity = 0.95
blur = true

[font]
normal = { family = "ComicShannsMono Nerd Font", style="Mono Regular" }
bold= { family = "ComicShannsMono Nerd Font", style="Mono Bold" }
italic= { family = "ComicShannsMono Nerd Font", style="Mono Italic" }
size = 14

[terminal]
shell = "tmux"
